spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/platform_db
  kafka:
    bootstrap-servers: kafka:9092

s3:
  bucket: ${S3_BUCKET:Shipment-logistics-catalog}
  endpoint: ${S3_ENDPOINT:}
  region: ${AWS_REGION}
  access-key-id: ${AWS_ACCESS_KEY_ID:}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
