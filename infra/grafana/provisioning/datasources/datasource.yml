apiVersion: 1

datasources:
  - name: Prometheus
    uid: PBFA97CFB590B2093
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
  - name: PostgreSQL-Logistics
    uid: postgres-logistics
    type: postgres
    access: proxy
    url: postgres:5432
    database: logistics_db
    user: ${POSTGRES_USER:-change_me}
    secureJsonData:
      password: ${POSTGRES_PASSWORD:-change_me}
    jsonData:
      sslmode: disable
      timescaledb: false
    editable: false
